name: GeekNews Daily Pipeline

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00 전일)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: geeknews-daily-pipeline

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4o-mini' }}
          GEEKNEWS_URL: https://news.hada.io/new
        run: python -m src.handler

      - name: Commit output
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geeknews-daily-pipeline/output/
          git diff --cached --quiet || git commit -m "📰 GeekNews 데일리 - $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
